name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**' # Solo se dispara si tocamos código de React
      - '.github/workflows/deploy.yml'
  workflow_dispatch: # Permite dispararlo a mano desde la web de GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
        
      - name: Build Project
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://gensen.hostcx.com.ar/api/
        
      - name: Upload dist to Server
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub
        id: deployment
        uses: actions/deploy-pages@v4
